<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#6C63FF"/>
<title>My Habit Tracker</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0F0F1A;color:#fff;max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh}
button{cursor:pointer}
.header{background:linear-gradient(135deg,#6C63FF,#E040FB);padding:20px 20px 30px;border-radius:0 0 24px 24px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.xp-box{background:rgba(255,255,255,0.2);border-radius:14px;padding:8px 14px;text-align:center}
.xp-box div:first-child{font-size:18px;font-weight:800}
.xp-box div:last-child{font-size:10px}
.progress-ring{display:flex;align-items:center;gap:16px;margin-top:16px;background:rgba(255,255,255,0.15);border-radius:16px;padding:14px}
.content{padding:0 16px;margin-top:20px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:18px;font-weight:700}
.add-btn{background:#6C63FF;border:none;color:#fff;border-radius:20px;padding:8px 16px;font-weight:700;font-size:13px}
.add-form{background:#1E1E30;border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #6C63FF}
.add-form input{width:100%;background:#2A2A40;border:none;border-radius:10px;padding:10px 12px;color:#fff;font-size:14px;margin-bottom:10px}
.color-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer}
.form-btns{display:flex;gap:8px}
.form-btns button{flex:1;border:none;border-radius:10px;padding:10px;font-weight:700;font-size:13px}
.habit-card{background:#1E1E30;border-radius:16px;padding:14px;margin-bottom:12px}
.habit-top{display:flex;justify-content:space-between;align-items:center}
.habit-info{display:flex;align-items:center;gap:10px}
.habit-dot{width:14px;height:14px;border-radius:50%}
.habit-title{font-weight:700;font-size:15px}
.habit-sub{font-size:11px;color:#aaa}
.habit-actions{display:flex;gap:8px;align-items:center}
.done-btn{border:none;border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;font-weight:600}
.del-btn{background:none;border:none;color:#FF6584;font-size:16px}
.timer-row{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.timer-display{background:#2A2A40;border-radius:10px;padding:7px 14px;font-family:monospace;font-size:15px;font-weight:700}
.session-log{font-size:11px;color:#aaa;background:#2A2A40;border-radius:8px;padding:4px 10px;margin-top:4px}
.empty{text-align:center;color:#888;padding:40px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-nav button{background:#2A2A40;border:none;color:#fff;border-radius:10px;padding:6px 14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-day-label{text-align:center;font-size:11px;color:#888}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.day-num{font-size:12px}
.day-done{font-size:9px;color:#43D9AD}
.detail-box{background:#1E1E30;border-radius:16px;padding:14px;margin-top:16px}
.detail-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.graph-box{background:#1E1E30;border-radius:16px;padding:16px;margin-bottom:16px}
.bar-wrap{display:flex;align-items:flex-end;gap:8px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 0 0;background:#6C63FF;min-height:0;transition:height 0.5s}
.bar-label{font-size:10px;color:#888}
.bar-val{font-size:10px;color:#aaa}
.focus-row{margin-bottom:14px}
.focus-bar-bg{background:#2A2A40;border-radius:8px;height:10px}
.focus-bar{height:10px;border-radius:8px;transition:width 0.5s}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.insight-card{background:#1E1E30;border-radius:14px;padding:14px}
.insight-val{font-size:20px;font-weight:800}
.insight-label{font-size:11px;color:#aaa;margin-top:2px}
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge-card{background:#1E1E30;border-radius:16px;padding:16px}
.badge-icon{font-size:32px}
.badge-name{font-weight:700;font-size:13px;margin-top:6px}
.badge-desc{font-size:11px;color:#aaa;margin-top:2px}
.badge-xp{font-size:11px;color:#FFB347;margin-top:6px}
.badge-earned{font-size:10px;color:#43D9AD;margin-top:4px}
.xp-bar-wrap{background:#1E1E30;border-radius:16px;padding:16px;margin-top:16px}
.xp-bar-bg{background:#2A2A40;border-radius:8px;height:12px}
.xp-bar{background:linear-gradient(90deg,#6C63FF,#E040FB);height:12px;border-radius:8px;transition:width 0.5s}
.xp-hint{font-size:11px;color:#aaa;margin-top:6px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1E1E30;border-top:1px solid #2A2A40;display:flex}
.nav-btn{flex:1;background:none;border:none;color:#888;padding:12px 0 8px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#6C63FF;font-weight:700}
.nav-icon{font-size:20px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div id="dateLabel" style="font-size:12px;opacity:0.8"></div>
      <div style="font-size:22px;font-weight:700">My Habit Coach 🧘</div>
    </div>
    <div class="xp-box">
      <div id="xpDisplay">⚡ 0</div>
      <div>XP Points</div>
    </div>
  </div>
  <div class="progress-ring">
    <svg width="60" height="60">
      <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
      <circle id="ringCircle" cx="30" cy="30" r="24" fill="none" stroke="#fff" stroke-width="6"
        stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round" transform="rotate(-90 30 30)" style="transition:stroke-dashoffset 0.5s"/>
      <text id="ringPct" x="30" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">0%</text>
    </svg>
    <div>
      <div id="progressText" style="font-size:16px;font-weight:700">0 / 0 habits done</div>
      <div style="font-size:12px;opacity:0.8">Keep going! You're doing great 💪</div>
    </div>
  </div>
</div>

<div class="content" id="mainContent"></div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('today')" id="tab-today"><span class="nav-icon">🏠</span>Today</button>
  <button class="nav-btn" onclick="switchTab('calendar')" id="tab-calendar"><span class="nav-icon">📅</span>Calendar</button>
  <button class="nav-btn" onclick="switchTab('graphs')" id="tab-graphs"><span class="nav-icon">📊</span>Graphs</button>
  <button class="nav-btn" onclick="switchTab('rewards')" id="tab-rewards"><span class="nav-icon">🏆</span>Rewards</button>
</div>

<script>
const COLORS=["#6C63FF","#FF6584","#43D9AD","#FFB347","#4FC3F7","#E040FB","#FF7043","#66BB6A"];
const BADGES=[
  {id:"first",label:"First Step",icon:"🌱",desc:"Complete your first habit",xp:10},
  {id:"streak3",label:"On Fire",icon:"🔥",desc:"3-day streak",xp:30},
  {id:"streak7",label:"Gold Week",icon:"🥇",desc:"7-day streak",xp:70},
  {id:"streak30",label:"Platinum",icon:"💎",desc:"30-day streak",xp:300},
  {id:"focus60",label:"Deep Diver",icon:"🧠",desc:"60+ min focus in one session",xp:50},
  {id:"habits5",label:"Multi-Master",icon:"⚡",desc:"5 habits in one day",xp:40},
];

let habits=JSON.parse(localStorage.getItem("hb_habits")||"[]");
let logs=JSON.parse(localStorage.getItem("hb_logs")||"{}");
let xp=parseInt(localStorage.getItem("hb_xp")||"0");
let badges=JSON.parse(localStorage.getItem("hb_badges")||"[]");
let currentTab="today";
let activeTimer=null;
let timerInterval=null;
let selDate=todayStr();
let newColor=COLORS[0];

function save(){
  localStorage.setItem("hb_habits",JSON.stringify(habits));
  localStorage.setItem("hb_logs",JSON.stringify(logs));
  localStorage.setItem("hb_xp",xp);
  localStorage.setItem("hb_badges",JSON.stringify(badges));
}

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d).toISOString().slice(0,10);}
function minToTime(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
function durLabel(m){return m>=60?Math.floor(m/60)+"h "+(m%60)+"m":m+"m";}

function getStreak(hid,upTo){
  let s=0,d=new Date(upTo);
  while(true){const k=fmtDate(d);if(logs[k]&&logs[k][hid]&&logs[k][hid].done){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function awardXp(hid,durMins,date){
  let gained=10;
  if(durMins>=60){gained+=20;checkBadge("focus60");}
  xp+=gained;
  checkBadge("first");
  const streak=getStreak(hid,date);
  if(streak>=3)checkBadge("streak3");
  if(streak>=7)checkBadge("streak7");
  if(streak>=30)checkBadge("streak30");
  const doneCnt=Object.values(logs[date]||{}).filter(l=>l.done).length;
  if(doneCnt>=5)checkBadge("habits5");
  save();
}

function checkBadge(id){if(!badges.includes(id)){badges.push(id);save();}}

function updateHeader(){
  const d=new Date();
  document.getElementById("dateLabel").textContent=d.toLocaleDateString("en",{weekday:"long",month:"long",day:"numeric"});
  document.getElementById("xpDisplay").textContent="⚡ "+xp;
  const dl=logs[todayStr()]||{};
  const done=habits.filter(h=>dl[h.id]&&dl[h.id].done).length;
  const total=habits.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("progressText").textContent=done+" / "+total+" habits done";
  document.getElementById("ringPct").textContent=pct+"%";
  const circ=2*Math.PI*24;
  document.getElementById("ringCircle").style.strokeDashoffset=circ*(1-pct/100);
}

function switchTab(t){
  currentTab=t;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  render();
}

function render(){
  updateHeader();
  const c=document.getElementById("mainContent");
  if(currentTab==="today")c.innerHTML=renderToday();
  else if(currentTab==="calendar")c.innerHTML=renderCalendar();
  else if(currentTab==="graphs")c.innerHTML=renderGraphs();
  else if(currentTab==="rewards")c.innerHTML=renderRewards();
}

function renderToday(){
  let html=`<div class="section-header"><div class="section-title">Today's Habits</div><button class="add-btn" onclick="toggleAddForm()">+ Add</button></div>`;
  html+=`<div id="addForm" style="display:none" class="add-form">
    <input id="newTitle" placeholder="Habit title (e.g. Meditation)"/>
    <div class="color-row" id="colorRow">${COLORS.map(c=>`<div class="color-dot" style="background:${c};border:3px solid ${c===newColor?'#fff':'transparent'}" onclick="pickColor('${c}')"></div>`).join("")}</div>
    <div class="form-btns">
      <button style="background:#6C63FF;color:#fff" onclick="addHabit()">Add Habit</button>
      <button style="background:#2A2A40;color:#fff" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>`;

  if(habits.length===0){html+='<div class="empty">No habits yet. Add one! 🌱</div>';return html;}

  const dl=logs[todayStr()]||{};
  habits.forEach(h=>{
    const hl=dl[h.id]||{done:false,sessions:[]};
    const isActive=activeTimer&&activeTimer.habitId===h.id;
    const streak=getStreak(h.id,todayStr());
    const sessions=hl.sessions||[];
    const totalToday=sessions.reduce((s,ss)=>s+ss.dur,0);

    html+=`<div class="habit-card" style="border-left:4px solid ${h.color}">
      <div class="habit-top">
        <div class="habit-info">
          <div class="habit-dot" style="background:${h.color}"></div>
          <div>
            <div class="habit-title">${h.title}</div>
            <div class="habit-sub">🔥 ${streak} day streak${totalToday>0?" · ⏱ "+durLabel(totalToday):""}</div>
          </div>
        </div>
        <div class="habit-actions">
          <button class="done-btn" style="background:${hl.done?'#43D9AD':'#2A2A40'}" onclick="toggleDone('${h.id}')">${hl.done?"↩ Undo":"Mark Done"}</button>
          <button class="del-btn" onclick="deleteHabit('${h.id}','${h.title}')">🗑</button>
        </div>
      </div>
      <div class="timer-row">`;

    if(!isActive){
      html+=`<button style="background:${h.color};border:none;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:12px" onclick="startTimer('${h.id}')">▶ Start Timer</button>`;
    } else {
      html+=`<div class="timer-display" style="color:${h.color}" id="timerDisp">00:00:00</div>
        <button style="background:#FF6584;border:none;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:12px" onclick="stopTimer('${h.id}')">⏹ Stop</button>
        <button style="background:#2A2A40;border:none;border-radius:10px;padding:7px 10px;color:#aaa;font-weight:700;font-size:12px" onclick="cancelTimer()">↩ Cancel</button>`;
    }

    html+=`</div>`;
    sessions.forEach(s=>{
      html+=`<div class="session-log">🕐 ${s.start} → ${s.end} &nbsp;|&nbsp; ⏱ ${durLabel(s.dur)}</div>`;
    });
    html+=`</div>`;
  });
  return html;
}

function renderCalendar(){
  const d=new Date(selDate);
  const year=d.getFullYear(),month=d.getMonth();
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const monthName=d.toLocaleDateString("en",{month:"long",year:"numeric"});

  let html=`<div class="cal-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div style="font-weight:700;font-size:16px">${monthName}</div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-day-label">${d}</div>`).join("")}
    ${Array(first).fill('<div></div>').join("")}`;

  for(let i=1;i<=days;i++){
    const key=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const dl=logs[key]||{};
    const done=habits.filter(h=>dl[h.id]&&dl[h.id].done).length;
    const pct=habits.length?done/habits.length:0;
    const isToday=key===todayStr();
    const bg=pct>0?`rgba(108,99,255,${0.2+pct*0.8})`:"#1E1E30";
    html+=`<div class="cal-day" style="background:${bg};border:2px solid ${isToday?'#E040FB':'transparent'}" onclick="selDate='${key}';render()">
      <div class="day-num" style="font-weight:${isToday?700:400}">${i}</div>
      ${done>0?`<div class="day-done">${done}✓</div>`:""}
    </div>`;
  }

  html+=`</div><div class="detail-box">
    <div style="font-weight:700;margin-bottom:10px">📅 ${new Date(selDate+"T12:00:00").toLocaleDateString("en",{weekday:"long",month:"short",day:"numeric"})}</div>`;

  if(habits.length===0){html+='<div style="color:#888;font-size:13px">No habits yet.</div>';}
  habits.forEach(h=>{
    const hl=(logs[selDate]||{})[h.id]||{done:false,sessions:[]};
    const totalMins=(hl.sessions||[]).reduce((s,ss)=>s+ss.dur,0);
    html+=`<div class="detail-row">
      <div style="width:10px;height:10px;border-radius:50%;background:${h.color}"></div>
      <div style="flex:1;font-size:13px">${h.title}</div>
      <div style="font-size:12px">${hl.done?"✅":"⬜"}</div>
      ${totalMins>0?`<div style="font-size:11px;color:#aaa">⏱ ${durLabel(totalMins)}</div>`:""}
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function renderGraphs(){
  const weekData=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const key=fmtDate(d);
    const dl=logs[key]||{};
    return{label:d.toLocaleDateString("en",{weekday:"short"}),done:habits.filter(h=>dl[h.id]&&dl[h.id].done).length};
  });
  const maxW=Math.max(...weekData.map(d=>d.done),1);

  const focusData=habits.map(h=>{
    const totalMins=Object.values(logs).reduce((sum,dl)=>sum+(dl[h.id]?.sessions||[]).reduce((s,ss)=>s+ss.dur,0),0);
    return{...h,totalMins};
  }).filter(h=>h.totalMins>0);
  const maxF=Math.max(...focusData.map(d=>d.totalMins),1);

  let html=`<div style="font-weight:700;font-size:16px;margin-bottom:14px">📊 Weekly Progress</div>
  <div class="graph-box">
    <div class="bar-wrap">
      ${weekData.map(d=>`<div class="bar-col">
        <div class="bar-val">${d.done}</div>
        <div class="bar" style="height:${(d.done/maxW)*90}px"></div>
        <div class="bar-label">${d.label}</div>
      </div>`).join("")}
    </div>
  </div>

  <div style="font-weight:700;font-size:16px;margin-bottom:14px">🧠 Deep Focus (Total Minutes)</div>
  <div class="graph-box">
    ${focusData.length===0?'<div style="color:#888;font-size:13px">Use timer to track focus time!</div>':
    focusData.map(h=>`<div class="focus-row">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="color:${h.color};font-weight:600">${h.title}</span>
        <span style="color:#aaa">${durLabel(h.totalMins)}</span>
      </div>
      <div class="focus-bar-bg"><div class="focus-bar" style="background:${h.color};width:${(h.totalMins/maxF)*100}%"></div></div>
    </div>`).join("")}
  </div>

  <div style="font-weight:700;font-size:16px;margin-bottom:14px">💡 Insights</div>
  <div class="insight-grid">
    ${[
      {label:"Total XP",val:"⚡ "+xp,color:"#6C63FF"},
      {label:"Badges Earned",val:"🏅 "+badges.length,color:"#FFB347"},
      {label:"Habits Created",val:"📌 "+habits.length,color:"#43D9AD"},
      {label:"Days Logged",val:"📅 "+Object.keys(logs).length,color:"#FF6584"},
    ].map(s=>`<div class="insight-card" style="border-top:3px solid ${s.color}">
      <div class="insight-val">${s.val}</div>
      <div class="insight-label">${s.label}</div>
    </div>`).join("")}
  </div>`;
  return html;
}

function renderRewards(){
  let html=`<div style="font-weight:700;font-size:16px;margin-bottom:6px">🏆 Rewards & Badges</div>
  <div style="color:#aaa;font-size:12px;margin-bottom:16px">Complete habits to earn badges and XP!</div>
  <div class="badge-grid">
    ${BADGES.map(b=>{
      const earned=badges.includes(b.id);
      return`<div class="badge-card" style="border:2px solid ${earned?(b.id==='streak30'?'#FFD700':'#6C63FF'):'#2A2A40'};opacity:${earned?1:0.5}">
        <div class="badge-icon">${b.icon}</div>
        <div class="badge-name">${b.label}</div>
        <div class="badge-desc">${b.desc}</div>
        <div class="badge-xp">⚡ +${b.xp} XP</div>
        ${earned?'<div class="badge-earned">✅ Earned!</div>':""}
      </div>`;
    }).join("")}
  </div>
  <div class="xp-bar-wrap">
    <div style="font-weight:700;margin-bottom:8px">⚡ XP Progress — Level ${Math.floor(xp/100)+1}</div>
    <div class="xp-bar-bg"><div class="xp-bar" style="width:${xp%100}%"></div></div>
    <div class="xp-hint">${xp%100}/100 XP to next level</div>
  </div>`;
  return html;
}

function toggleAddForm(){
  const f=document.getElementById("addForm");
  f.style.display=f.style.display==="none"?"block":"none";
}

function pickColor(c){
  newColor=c;
  document.querySelectorAll(".color-dot").forEach(el=>{
    el.style.border="3px solid "+(el.style.background===c?"#fff":"transparent");
  });
}

function addHabit(){
  const t=document.getElementById("newTitle").value.trim();
  if(!t)return;
  habits.push({id:Date.now().toString(),title:t,color:newColor});
  save();render();
}

function deleteHabit(id,name){
  if(confirm('"'+name+'" habit delete karna chahte hain?')){
    habits=habits.filter(h=>h.id!==id);save();render();
  }
}

function toggleDone(hid){
  const d=todayStr();
  if(!logs[d])logs[d]={};
  if(!logs[d][hid])logs[d][hid]={done:false,sessions:[]};
  logs[d][hid].done=!logs[d][hid].done;
  if(logs[d][hid].done)awardXp(hid,0,d);
  save();render();
}

function startTimer(hid){
  if(activeTimer)return;
  activeTimer={habitId:hid,start:Date.now()};
  timerInterval=setInterval(()=>{
    const el=document.getElementById("timerDisp");
    if(!el){clearInterval(timerInterval);return;}
    const sec=Math.floor((Date.now()-activeTimer.start)/1000);
    el.textContent=String(Math.floor(sec/3600)).padStart(2,"0")+":"+String(Math.floor(sec%3600/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");
  },1000);
  render();
}

function cancelTimer(){
  clearInterval(timerInterval);
  activeTimer=null;
  render();
}

function stopTimer(hid){
  if(!activeTimer||activeTimer.habitId!==hid)return;
  clearInterval(timerInterval);
  const endTime=Date.now();
  const durMins=Math.max(1,Math.floor((endTime-activeTimer.start)/60000));
  const nowMin=Math.floor((endTime-new Date().setHours(0,0,0,0))/60000);
  const startMin=nowMin-durMins;
  const d=todayStr();
  if(!logs[d])logs[d]={};
  if(!logs[d][hid])logs[d][hid]={done:false,sessions:[]};
  logs[d][hid].done=true;
  logs[d][hid].sessions.push({start:minToTime(Math.max(0,startMin)),end:minToTime(nowMin),dur:durMins});
  activeTimer=null;
  awardXp(hid,durMins,d);
  save();render();
}

function changeMonth(dir){
  const d=new Date(selDate);
  d.setMonth(d.getMonth()+dir);
  selDate=fmtDate(d);
  render();
}

render();
</script>
